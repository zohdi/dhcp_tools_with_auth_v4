{% extends "layout.html" %}
{% block content %}
<div class="card shadow-sm border-0">
  <div class="card-body">
    <h3 class="mb-3">Setup completed</h3>
    <p class="text-muted">DHCP Manager is ready. You can continue to the login page.</p>

    <h5>Apply log</h5>
    <pre class="bg-dark text-light p-3 rounded small" style="white-space: pre-wrap; max-height: 400px; overflow:auto;">{% for line in logs %}{{ line }}
{% endfor %}</pre>

    <a href="{{ url_for('login') }}" class="btn btn-primary">Go to login</a>
  </div>
</div>
{% endblock %}
