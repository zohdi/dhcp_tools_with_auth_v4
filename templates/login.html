{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0 mt-4">
      <div class="card-body p-4">
        <h3 class="mb-3">Login</h3>
        <p class="text-muted mb-4">Admin requires password. Read-only skips authentication.</p>

        <form method="POST" class="mb-3">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input name="username" class="form-control" placeholder="{{ admin_username }}" autocomplete="username">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" autocomplete="current-password">
          </div>

          <button type="submit" class="btn btn-primary w-100 mb-2">Login</button>
        </form>

        <form method="POST">
          <input type="hidden" name="mode" value="readonly">
          <button type="submit" class="btn btn-outline-secondary w-100">Read Only Login</button>
        </form>

        <hr class="my-4">
        <small class="text-muted">
          Tip: set <code>ADMIN_PASSWORD</code> in <code>config.py</code>.
        </small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
